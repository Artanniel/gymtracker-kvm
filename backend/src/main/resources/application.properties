# Datasource Config
quarkus.datasource.db-kind=postgresql
quarkus.datasource.username=gymtracker_user
quarkus.datasource.password=gymtracker_password
quarkus.datasource.jdbc.url=jdbc:postgresql://localhost:5432/gymtracker

# Hibernate ORM (Panache)
quarkus.hibernate-orm.database.generation=update
quarkus.hibernate-orm.log.sql=true

# OIDC (Google Auth Configuration)
# Substituir pelos valores do Google Cloud Console futuramente
# quarkus.oidc.auth-server-url=https://accounts.google.com
# quarkus.oidc.client-id=SEU_CLIENT_ID_AQUI
# quarkus.oidc.application-type=service

quarkus.http.port=8080
