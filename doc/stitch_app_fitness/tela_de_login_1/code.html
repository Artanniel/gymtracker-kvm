<html>
  <head>
    <link rel="preconnect" href="https://fonts.gstatic.com/" crossorigin="" />
    <link
      rel="stylesheet"
      as="style"
      onload="this.rel='stylesheet'"
      href="https://fonts.googleapis.com/css2?display=swap&amp;family=Lexend%3Awght%40400%3B500%3B700%3B900&amp;family=Noto+Sans%3Awght%40400%3B500%3B700%3B900"
    />

    <title>Stitch Design</title>
    <link rel="icon" type="image/x-icon" href="data:image/x-icon;base64," />

    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  </head>
  <body>
    <div
      class="relative flex h-auto min-h-screen w-full flex-col bg-[#111811] dark justify-between group/design-root overflow-x-hidden"
      style='font-family: Lexend, "Noto Sans", sans-serif;'
    >
      <div>
        <div class="flex items-center bg-[#111811] p-4 pb-2 justify-between">
          <h2 class="text-white text-lg font-bold leading-tight tracking-[-0.015em] flex-1 text-center pl-12">FitTrack</h2>
          <div class="flex w-12 items-center justify-end">
            <button
              class="flex max-w-[480px] cursor-pointer items-center justify-center overflow-hidden rounded-lg h-12 bg-transparent text-white gap-2 text-base font-bold leading-normal tracking-[0.015em] min-w-0 p-0"
            >
              <div class="text-white" data-icon="Question" data-size="24px" data-weight="regular">
                <svg xmlns="http://www.w3.org/2000/svg" width="24px" height="24px" fill="currentColor" viewBox="0 0 256 256">
                  <path
                    d="M140,180a12,12,0,1,1-12-12A12,12,0,0,1,140,180ZM128,72c-22.06,0-40,16.15-40,36v4a8,8,0,0,0,16,0v-4c0-11,10.77-20,24-20s24,9,24,20-10.77,20-24,20a8,8,0,0,0-8,8v8a8,8,0,0,0,16,0v-.72c18.24-3.35,32-17.9,32-35.28C168,88.15,150.06,72,128,72Zm104,56A104,104,0,1,1,128,24,104.11,104.11,0,0,1,232,128Zm-16,0a88,88,0,1,0-88,88A88.1,88.1,0,0,0,216,128Z"
                  ></path>
                </svg>
              </div>
            </button>
          </div>
        </div>
        <h2 class="text-white tracking-light text-[28px] font-bold leading-tight px-4 text-center pb-3 pt-5">Bem-vindo de volta!</h2>
        <div class="flex max-w-[480px] flex-wrap items-end gap-4 px-4 py-3">
          <label class="flex flex-col min-w-40 flex-1">
            <input
              placeholder="E-mail ou nome de usuário"
              class="form-input flex w-full min-w-0 flex-1 resize-none overflow-hidden rounded-lg text-white focus:outline-0 focus:ring-0 border-none bg-[#293829] focus:border-none h-14 placeholder:text-[#9db89d] p-4 text-base font-normal leading-normal"
              value=""
            />
          </label>
        </div>
        <div class="flex max-w-[480px] flex-wrap items-end gap-4 px-4 py-3">
          <label class="flex flex-col min-w-40 flex-1">
            <input
              placeholder="Senha"
              class="form-input flex w-full min-w-0 flex-1 resize-none overflow-hidden rounded-lg text-white focus:outline-0 focus:ring-0 border-none bg-[#293829] focus:border-none h-14 placeholder:text-[#9db89d] p-4 text-base font-normal leading-normal"
              value=""
            />
          </label>
        </div>
        <p class="text-[#9db89d] text-sm font-normal leading-normal pb-3 pt-1 px-4 underline">Esqueci minha senha</p>
        <div class="flex px-4 py-3">
          <button
            class="flex min-w-[84px] max-w-[480px] cursor-pointer items-center justify-center overflow-hidden rounded-lg h-12 px-5 flex-1 bg-[#17cf17] text-[#111811] text-base font-bold leading-normal tracking-[0.015em]"
          >
            <span class="truncate">Entrar</span>
          </button>
        </div>
        <p class="text-[#9db89d] text-sm font-normal leading-normal pb-3 pt-1 px-4 text-center">Não tem uma conta?</p>
        <p class="text-[#9db89d] text-sm font-normal leading-normal pb-3 pt-1 px-4 text-center underline">Criar nova conta</p>
      </div>
      <div>
        <div class="p-4">
          <div class="flex items-stretch justify-between gap-4 rounded-lg">
            <div class="flex flex-[2_2_0px] flex-col gap-4">
              <div class="flex flex-col gap-1">
                <p class="text-white text-base font-bold leading-tight">Parceiro oficial</p>
                <p class="text-[#9db89d] text-sm font-normal leading-normal">Descontos exclusivos para membros FitTrack</p>
              </div>
              <button
                class="flex min-w-[84px] max-w-[480px] cursor-pointer items-center justify-center overflow-hidden rounded-lg h-8 px-4 flex-row-reverse bg-[#293829] text-white text-sm font-medium leading-normal w-fit"
              >
                <span class="truncate">Ver ofertas</span>
              </button>
            </div>
            <div
              class="w-full bg-center bg-no-repeat aspect-video bg-cover rounded-lg flex-1"
              style='background-image: url("https://lh3.googleusercontent.com/aida-public/AB6AXuBGmhcayXB6pPJTj3yD3duuHOThW9ptP8DkB_mn7NCyj9PN4x2R143UB8Sb0bllnRM8lYz8HVlpWKkeN3Fa5zlHbXxwKDfZK_ExVmP8T4rxrdZaFGUCfDxjnKLjiaeWtZWMA5BOhwU08n9UnGxF_NgtRIEtgWPJxcpLVaV6jC3dM3i1EjTXcWlSiHxZcbUJKMPhpPB-n1xud614HDb6XYO1odPBLHvUNbHMt-YmxdWCw9Pi7r9FCy3oejJlHcgFvw8lgeOPGXW9DFI");'
            ></div>
          </div>
        </div>
        <div class="h-5 bg-[#111811]"></div>
      </div>
    </div>
  </body>
</html>
