version: '3.8'
services:
  db:
    image: postgres:15-alpine
    container_name: gymtracker_db
    environment:
      POSTGRES_USER: gymtracker_user
      POSTGRES_PASSWORD: gymtracker_password
      POSTGRES_DB: gymtracker
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  pgdata:
